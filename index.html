<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMangá - Leia Online Grátis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0a0f 0%, #050510 100%);
            color: #e0e0ff;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #9b4dff, #4d4dff, #6a0dad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(107, 77, 255, 0.3);
        }

        .logo p {
            font-size: 0.8rem;
            color: #8a6eff;
        }

        .stats {
            font-size: 0.75rem;
            color: #b87cff;
            margin-top: 0.3rem;
        }

        .search-section {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-wrapper {
            display: flex;
            gap: 0.5rem;
        }

        .search-input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            background: #0a0a1a;
            border: 2px solid #6a4eff;
            border-radius: 2rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus {
            box-shadow: 0 0 15px #6a4eff;
            border-color: #9b4dff;
        }

        .search-btn {
            background: linear-gradient(135deg, #6a4eff, #9b4dff);
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .previews {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #0a0a1a;
            border-radius: 1rem;
            margin-top: 0.5rem;
            max-height: 350px;
            overflow-y: auto;
            z-index: 100;
            border: 1px solid #6a4eff;
            display: none;
        }

        .previews.active {
            display: block;
        }

        .preview-item {
            padding: 0.8rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .preview-item:hover {
            background: #4a2a8a55;
        }

        .tabs {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #0a0a1a;
            border: 1px solid #4a2a8a;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            color: #c8b0ff;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #6a4eff, #9b4dff);
            border-color: #9b4dff;
            color: white;
            box-shadow: 0 0 15px #6a4eff;
        }

        .pagination-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .page-btn {
            background: #6a4eff;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .page-btn:disabled {
            background: #2a2a5a;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .page-numbers {
            background: #0a0a1a;
            border: 1px solid #6a4eff;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #b87cff;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 1.2rem;
            min-height: 500px;
        }

        .book-card {
            background: linear-gradient(135deg, #0a0a1a, #050510);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #4a2a8a;
            transition: all 0.2s;
        }

        .book-card:hover {
            transform: translateY(-5px);
            border-color: #9b4dff;
            box-shadow: 0 8px 20px rgba(107, 77, 255, 0.3);
        }

        .card-img {
            height: 220px;
            background: linear-gradient(145deg, #12122a, #050510);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
        }

        .card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #6a4eff;
            padding: 2px 10px;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .card-content {
            padding: 0.9rem;
        }

        .card-title {
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #d8c8ff;
        }

        .card-author {
            font-size: 0.7rem;
            color: #9a8aff;
            margin-top: 0.3rem;
        }

        .rating {
            font-size: 0.7rem;
            color: #ffcc66;
            margin-top: 0.4rem;
        }

        .read-btn {
            margin-top: 0.7rem;
            background: #6a4eff;
            padding: 0.5rem;
            border-radius: 2rem;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }

        .results-count {
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #b87cff;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #4a2a8a;
            font-size: 0.7rem;
            color: #6a5a9a;
        }

        @media (max-width: 768px) {
            body { padding: 0.8rem; }
            .books-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.8rem; }
            .card-img { height: 170px; font-size: 2.8rem; }
            .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1>📖 NOVA MANGA</h1>
            <p>A maior biblioteca online de mangás, animes e muito mais</p>
            <div class="stats" id="totalStats">Carregando biblioteca...</div>

    <div class="search-section">

        </div>
        <div id="previews" class="previews"></div>

    <div class="tabs">

    <div class="books-grid" id="booksGrid"></div>

    <footer>© Nova Mangá - Sua plataforma de leitura online</footer>
</div>

    ];

        "AliceSoft", "elf", "Minori", "Black Lilith", "Zion", "Waffle", "Empress", "Guilty", "Atelier Kaguya"
    ];
    
    const authorsLN = [
        "Chugong", "Kugane Maruyama", "Rifujin na Magonote", "Tappei Nagatsuki", "Fuse", "Syougo Kinugasa",
        "Reki Kawahara", "Yuu Kamiya", "Natsume Akatsuki", "Fujino Omori", "Aneko Yusagi", "Kumo Kagyu"
    ];
    
    const authorsManhwa = [
        "Chugong", "SIU", "TurtleMe", "Sing Shong", "Son Jeho", "Yongje Park", "Taejun Pak", "Carnby Kim", "JH"
    ];
    
    const authorsComics = [
        "Robert Kirkman", "Brian K. Vaughan", "Alan Moore", "Frank Miller", "Neil Gaiman", "Garth Ennis",
        "Jeff Lemire", "Rick Remender", "Marjorie Liu", "Scott Snyder", "Ed Brubaker", "Kieron Gillen"
    ];
    
    const emojisManga = ["🔥", "⚔️", "👊", "🌀", "🗡️", "🏴‍☠️", "🕵️", "💀", "🚲", "💥", "🐉", "🍥", "⚡", "📖", "🎴", "👺", "🎌", "⚜️", "🌟", "✨"];
    const emojisHentai = ["💕", "🌈", "🍌", "👻", "🍧", "🎮", "⚔️", "💖", "🔥", "🌙", "💋", "🍑", "💦", "❤️‍🔥", "🔞", "😈", "💜", "🩷", "🍆", "💗"];
    const emojisAnime = ["🎬", "✨", "⭐", "☔", "📘", "🎨", "🏯", "🌸", "🎞️", "📀", "🎥", "🍿", "🎭", "🌟", "💫", "🎪", "🏮", "🎋", "🪭", "🎴"];
    const emojisLN = ["📘", "⚔️", "👑", "🌀", "⏰", "🐉", "🏫", "🗡️", "📖", "✨", "🧙", "🔮", "💫", "📚", "🎭"];
    const emojisManhwa = ["🇰🇷", "⚔️", "🗼", "👶", "📖", "🏰", "🥋", "🧛", "👑", "🌑", "🎴", "🔥", "💫", "⭐", "✨"];
    const emojisComics = ["🦸", "🦇", "🕷️", "⚡", "🛡️", "📚", "💀", "🎭", "🌍", "⚔️", "🦹", "🌟", "💥", "🎨", "📖"];
    
    const variations = ["", " - O Despertar", " - A Lenda", " - Crônicas", " - Gaiden", " - Side Story", " - Origins", 
                        " - Remaster", " - Edição Especial", " - O Início", " - O Fim", " - The Last", " - Zero", 
                        " - Infinity", " - Awakening", " - Revolution", " - Evolution", " - Genesis", " - Rebirth"];
    
    function generateBooks(category, namesList, authorsList, emojisList, targetCount) {
        const books = [];
        for (let i = 0; i < targetCount; i++) {
            const name = namesList[i % namesList.length];
            const variation = variations[Math.floor(Math.random() * variations.length)];
            let title = name;
            if (variation !== "" && Math.random() > 0.45) {
                title = name + variation;
            }
            const author = authorsList[Math.floor(Math.random() * authorsList.length)];
            const emoji = emojisList[Math.floor(Math.random() * emojisList.length)] + 
                         (Math.random() > 0.85 ? (Math.random() > 0.5 ? "✨" : "🔥") : "");
            const rating = (3.8 + Math.random() * 1.4).toFixed(1);
            const searchTerm = encodeURIComponent(name.split(" -")[0]);
            let amazonUrl = `https://www.amazon.com.br/s?k=${searchTerm}+${category}`;
            books.push({ title, author, category, emoji, rating, amazonUrl });
        }
        return books;
    }
    
    const MANGAS = generateBooks("manga", mangaNames, authorsManga, emojisManga, 1500);
    const HENTAIS = generateBooks("hentai", hentaiNames, authorsHentai, emojisHentai, 1500);
    const ANIMES = generateBooks("anime", animeNames, authorsLN, emojisAnime, 1500);
    const LIGHTNOVELS = generateBooks("lightnovel", lightNovelNames, authorsLN, emojisLN, 1500);
    const MANHWAS = generateBooks("manhwa", manhwaNames, authorsManhwa, emojisManhwa, 1500);
    const COMICS = generateBooks("comics", comicsNames, authorsComics, emojisComics, 1500);
    
    const TOTAL = MANGAS.length + HENTAIS.length + ANIMES.length + LIGHTNOVELS.length + MANHWAS.length + COMICS.length;
    document.getElementById('totalStats').innerHTML = `📚 ${TOTAL} títulos disponíveis | Leia online grátis`;
    document.querySelector('.tab-btn[data-tab="manga"]').innerHTML = `📖 Mangá (${MANGAS.length})`;
    document.querySelector('.tab-btn[data-tab="hentai"]').innerHTML = `💕 Hentai (${HENTAIS.length})`;
    document.querySelector('.tab-btn[data-tab="anime"]').innerHTML = `🎬 Anime (${ANIMES.length})`;
    document.querySelector('.tab-btn[data-tab="lightnovel"]').innerHTML = `📘 Light Novel (${LIGHTNOVELS.length})`;
    document.querySelector('.tab-btn[data-tab="manhwa"]').innerHTML = `🇰🇷 Manhwa (${MANHWAS.length})`;
    document.querySelector('.tab-btn[data-tab="comics"]').innerHTML = `🦸 Comics (${COMICS.length})`;
    
    let currentTab = "manga";
    let currentPage = 1;
    let currentSearch = "";
    const itemsPerPage = 20;
    
    function getCurrentCategoryBooks() {
        if (currentTab === "manga") return MANGAS;
        if (currentTab === "hentai") return HENTAIS;
        if (currentTab === "anime") return ANIMES;
        if (currentTab === "lightnovel") return LIGHTNOVELS;
        if (currentTab === "manhwa") return MANHWAS;
        return COMICS;
    }
    
    function filterBooks() {
        let books = getCurrentCategoryBooks();
        if (currentSearch.trim() !== "") {
            const searchLower = currentSearch.toLowerCase();
            books = books.filter(book => 
                book.title.toLowerCase().includes(searchLower) || 
                book.author.toLowerCase().includes(searchLower)
            );
        }
        return books;
    }
    
    function getTotalPages() {
        const filtered = filterBooks();
        return Math.ceil(filtered.length / itemsPerPage);
    }
    
    function getCurrentPageBooks() {
        const filtered = filterBooks();
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        return filtered.slice(start, end);
    }
    
    function renderBooks() {
        const pageBooks = getCurrentPageBooks();
        const totalPages = getTotalPages();
        const totalItems = filterBooks().length;
        
        document.getElementById('resultsCount').innerHTML = `📚 ${totalItems} títulos encontrados - Página ${currentPage} de ${totalPages || 1}`;
        document.getElementById('pageNumbers').innerHTML = `${currentPage}/${totalPages || 1}`;
        
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
        
        if (pageBooks.length === 0) {
            document.getElementById('booksGrid').innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">🔍 Nenhum título encontrado</div>`;
            return;
        }
        
        const categoryNames = { manga: "Mangá", hentai: "Hentai", anime: "Anime", lightnovel: "Light Novel", manhwa: "Manhwa", comics: "Comics" };
        const categoryName = categoryNames[currentTab];
        
        document.getElementById('booksGrid').innerHTML = pageBooks.map(book => `
            <a href="${book.amazonUrl}" target="_blank" rel="noopener noreferrer" class="book-card">
                <div class="card-img">
                    <span>${book.emoji}</span>
                    <span class="card-badge">${categoryName}</span>
                </div>
                <div class="card-content">
                    <div class="card-title">${book.title.substring(0, 38)}${book.title.length > 38 ? '...' : ''}</div>
                    <div class="card-author">${book.author}</div>
                    <div class="rating">⭐ ${book.rating} (${Math.floor(Math.random() * 5000) + 100} avaliações)</div>
                    <div class="read-btn">📖 Ler Agora</div>
                </div>
            </a>
        `).join('');
    }
    
    function updatePreviews() {
        const searchValue = currentSearch;
        if (searchValue === "") {
            document.getElementById('previews').classList.remove('active');
            return;
        }
        
        const books = getCurrentCategoryBooks();
        const searchLower = searchValue.toLowerCase();
        const matches = books.filter(book => 
            book.title.toLowerCase().includes(searchLower) || 
            book.author.toLowerCase().includes(searchLower)
        ).slice(0, 12);
        
        const previewsDiv = document.getElementById('previews');
        
        if (matches.length === 0) {
            previewsDiv.innerHTML = `<div class="preview-item">🔍 Nenhum resultado encontrado</div>`;
            previewsDiv.classList.add('active');
            return;
        }
        
        const categoryNames = { manga: "Mangá", hentai: "Hentai", anime: "Anime", lightnovel: "Light Novel", manhwa: "Manhwa", comics: "Comics" };
        const categoryName = categoryNames[currentTab];
        
        previewsDiv.innerHTML = matches.map(book => `
            <div class="preview-item" data-title="${book.title.replace(/"/g, '&quot;')}">
                <span class="preview-emoji">${book.emoji}</span>
                <div class="preview-info">
                    <div class="preview-title">${book.title.substring(0, 45)}</div>
                    <div class="preview-author">${book.author}</div>
                </div>
                <span class="preview-type">${categoryName}</span>
            </div>
        `).join('');
        
        previewsDiv.classList.add('active');
        
        document.querySelectorAll('.preview-item').forEach(item => {
            item.addEventListener('click', () => {
                const title = item.dataset.title;
                document.getElementById('searchInput').value = title;
                currentSearch = title;
                currentPage = 1;
                renderBooks();
                previewsDiv.classList.remove('active');
            });
        });
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        currentPage = 1;
        renderBooks();
        updatePreviews();
    });
    
    document.getElementById('searchBtn').addEventListener('click', () => {
        currentSearch = document.getElementById('searchInput').value;
        currentPage = 1;
        renderBooks();
        updatePreviews();
        document.getElementById('previews').classList.remove('active');
    });
    
    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderBooks();
        }
    });
    
    document.getElementById('nextPage').addEventListener('click', () => {
        const totalPages = getTotalPages();
        if (currentPage < totalPages) {
            currentPage++;
            renderBooks();
        }
    });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            currentPage = 1;
            currentSearch = "";
            document.getElementById('searchInput').value = "";
            renderBooks();
            updatePreviews();
        });
    });
    
    document.addEventListener('click', (e) => {
        const searchInput = document.getElementById('searchInput');
        const previews = document.getElementById('previews');
        if (!searchInput.contains(e.target) && !previews.contains(e.target)) {
            previews.classList.remove('active');
        }
    });
    
    renderBooks();
</script>
</body>
</html>
