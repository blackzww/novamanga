<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Mangá</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#000;
  color:#fff;
}

.header {
  position:sticky;
  top:0;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.7);
  padding:15px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav {
  display:flex;
  justify-content:center;
  gap:15px;
  font-size:14px;
  margin-top:5px;
}

.nav a {
  color:#0a84ff;
  text-decoration:none;
}

.container {
  padding:20px;
}

.card {
  background:#1c1c1e;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  transition:0.2s;
}

.card:hover {
  transform:scale(0.98);
}

.title {
  font-size:18px;
  font-weight:600;
}

.desc {
  color:#aaa;
  font-size:14px;
  margin:5px 0;
}

.btn {
  color:#0a84ff;
  font-size:14px;
}
</style>

</head>

<body>

<div class="header">
  📚 Nova Mangá
  <div class="nav">
    <a href="index.html">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="privacidade.html">Privacidade</a>
    <a href="termos.html">Termos</a>
  </div>
</div>

<div class="container" id="list"></div>

<script src="data.js"></script>

<script>
const list = document.getElementById("list");

db.forEach(item => {
  list.innerHTML += `
    <div class="card">
      <div class="title">${item.title}</div>
      <div class="desc">${item.desc.substring(0,100)}...</div>
      <a class="btn" href="post.html?id=${item.id}">Ler análise →</a>
    </div>
  `;
});
</script>

</body>
</html>
