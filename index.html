<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Nova Mangá | Análises de Mangás</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
  color:#fff;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.85);
  padding:20px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.header h1 {
  font-size:26px;
  background:linear-gradient(135deg,#fff,#0a84ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* NAV */
.nav {
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:20px;
}

.nav a {
  color:#8e8e93;
  text-decoration:none;
  font-size:14px;
}

/* BUSCA + FILTRO */
.search-box {
  max-width:800px;
  margin:20px auto;
  display:flex;
  gap:10px;
  padding:0 15px;
}

.search-box input,
.search-box select {
  background:#1c1c1e;
  border:none;
  border-radius:12px;
  padding:12px;
  color:#fff;
}

.search-box input {
  flex:1;
}

/* SEO TEXT */
.seo-box {
  max-width:800px;
  margin:10px auto;
  padding:0 20px;
  color:#aaa;
}

/* LISTA */
.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card {
  background:#1c1c1e;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  transition:0.2s;
  cursor:pointer;
}

.card:hover {
  transform:translateY(-5px);
}

.title {
  font-size:18px;
  font-weight:600;
}

.desc {
  color:#aaa;
  font-size:14px;
  margin:10px 0;
}

/* TAG */
.tag {
  font-size:12px;
  color:#0a84ff;
}

/* BOTÃO */
.btn {
  color:#0a84ff;
  font-size:14px;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:30px;
  color:#666;
  font-size:12px;
}
</style>

</head>

<body>

<div class="header">
  <h1>📚 Nova Mangá</h1>
  <div class="nav">
    <a href="index.html">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="privacidade.html">Privacidade</a>
    <a href="termos.html">Termos</a>
  </div>
</div>

<!-- 🔍 BUSCA + FILTRO -->
<div class="search-box">
  <input id="search" placeholder="Buscar mangá ou livro...">
  
  <select id="filter">
    <option value="all">Todos</option>
    <option value="manga">Mangá</option>
    <option value="livro">Livro</option>
  </select>
</div>

<!-- TEXTO SEO -->
<div class="seo-box">
  <p>Descubra os melhores mangás e livros com análises completas e recomendações detalhadas.</p>
</div>

<div class="container" id="list"></div>

<div class="footer">
  © 2026 Nova Mangá
</div>

<script src="data.js"></script>

<script>
const list = document.getElementById("list");
const searchInput = document.getElementById("search");
const filterSelect = document.getElementById("filter");

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function render(items){
  list.innerHTML = "";

  if(items.length === 0){
    list.innerHTML = "<p style='color:#888'>Nada encontrado...</p>";
    return;
  }

  items.forEach(item=>{
    list.innerHTML += `
      <div class="card" onclick="location.href='post.html?id=${item.id}'">
        <div class="title">${escapeHtml(item.title)}</div>
        <div class="tag">${item.category || "manga"}</div>
        <div class="desc">${escapeHtml(item.desc.substring(0,100))}...</div>
        <div class="btn">Ler análise →</div>
      </div>
    `;
  });
}

function update(){
  let filtered = db;

  const search = searchInput.value.toLowerCase();
  const filter = filterSelect.value;

  if(search){
    filtered = filtered.filter(i =>
      i.title.toLowerCase().includes(search)
    );
  }

  if(filter !== "all"){
    filtered = filtered.filter(i =>
      (i.category || "manga") === filter
    );
  }

  render(filtered);
}

// eventos
searchInput.addEventListener("input", update);
filterSelect.addEventListener("change", update);

// inicial
render(db);
</script>

</body>
</html>
